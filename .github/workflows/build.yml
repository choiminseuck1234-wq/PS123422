name: Build PyQt5 HWPX Merger

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # 수동 실행 가능

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Build with PyInstaller
      run: |
        # --onefile: 하나의 파일로 생성
        # --windowed: 콘솔 창 없이 실행 (GUI 앱용)
        # --noconfirm: 기존 빌드 파일 덮어쓰기
        pyinstaller --noconfirm --onefile --windowed --name "HWPX_Merger" main.py

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: HWPX_Merger_Windows_Executable
        path: dist/HWPX_Merger.exe
